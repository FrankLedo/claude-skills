name: PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (subset — omit types that don't make sense for a plugin repo)
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
          # Require a scope for feat and fix (e.g. feat(slack-monitor): ...)
          # Set to false if you prefer scopeless titles
          requireScope: false
          # Disallow uppercase first letter after the colon
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: >
            The subject "{subject}" must start with a lowercase letter.
